# Electron-builder config — v0.5.0.
# https://www.electron.build/configuration
appId: ai.open-design.ha-ai-designer
productName: HA AI Designer
copyright: Copyright © 2026 lxgxdx
asar: true

directories:
  # Where to write the packaged artifacts.
  output: dist
  # Where to look for the build output (we tsc to ./dist/).
  buildResources: build

files:
  # What's bundled into app.asar (the main app code).
  - dist/**/*
  - package.json
  - '!**/*.map'

# v0.5.0-alpha.5: extra files (daemon + web) are NOT bundled into
# asar — they live in resources/ alongside the executable. Main
# process loads them by absolute path via process.resourcesPath.
#
# Source is `build/{daemon,web}-bundle/` — a self-contained tree
# produced by `pnpm deploy --prod --legacy` (see
# `scripts/bundle-{daemon,web}.mjs`). The deploy step flattens
# pnpm's symlinked node_modules into a real directory tree that
# electron-builder can copy verbatim.
#
# Why this matters: pnpm's normal node_modules/ has symlinks like
#   node_modules/foo -> .pnpm/foo@1.0.0/node_modules/foo
# which break when copied to a different root (the rel path points
# back to the dev tree). Copying the deploy output avoids that.
#
# Earlier (v0.5.0-alpha.1 → alpha.4) we hand-rolled this by copying
# individual files (`daemon/dist/`, `web/.next/`, individual
# `node_modules/next/...` slices) — but the daemon's prod deps
# (better-sqlite3 native, express, ws, pino, ...) were never
# copied, so `require('better-sqlite3')` failed at startup.
extraResources:
  - from: build/daemon-bundle
    to: daemon
    filter: ['**/*']
  - from: build/web-bundle
    to: web
    filter: ['**/*']

win:
  # NSIS installer with per-user install (no admin needed).
  target:
    - target: nsis
      arch:
        - x64
  # Code signing placeholder — fill in for SmartScreen-free install.
  # certificateFile: ${env.CSC_LINK}
  # certificatePassword: ${env.CSC_KEY_PASSWORD}
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HA AI Designer
  # Show README on install finish (linking to docs site).
  # customLinks: []

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}-${arch}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: ${productName}-${version}.${ext}

# Compression: maximum for smaller download.
compression: maximum

# Skip publishing — we use the release workflow for that.
publish: null
