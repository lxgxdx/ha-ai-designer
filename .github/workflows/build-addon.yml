name: Build HA Add-on Image

# Builds the ha-ai-designer add-on Docker image on every push to main
# and on PRs. Publishes to GitHub Container Registry (ghcr.io).
#
# Triggered by:
#   - push to main (builds + pushes multi-arch)
#   - pull_request to main (builds amd64 only, no push — CI check)
#   - manual workflow_dispatch (for testing)

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      push:
        description: 'Push to ghcr.io?'
        type: boolean
        default: false

# Required to push to ghcr.io: the default GITHUB_TOKEN can read public
# packages but creating a new package requires explicit write permission.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Push destination: ghcr.io/<github.repository_owner>/ha-ai-designer.
  # Owner prefix is supplied in IMAGE_NAME so docker/metadata-action can
  # correctly resolve images to push to.  Don't include the owner in
  # `images:` below — that would create a double prefix.
  IMAGE_NAME: ${{ github.repository_owner }}/ha-ai-designer
  # The slug used by HA supervisor — must match config.yaml slug field
  ADDON_SLUG: ha_ai_designer

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch:
          # Only amd64 for now — multi-arch matrix pushes overwrite each
          # other (GHCR doesn't auto-merge manifest lists from parallel
          # CI jobs).  Re-enable aarch64 once we add the buildx imagetools
          # step that combines per-platform tags into one manifest list.
          - arch: amd64
            platform: linux/amd64
            base_image: ghcr.io/hassio-addons/base:16.3.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        # Only login when pushing (on main/tags), not on PR or manual runs
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ha-ai-designer
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
          labels: |
            org.opencontainers.image.title=HA AI Designer
            org.opencontainers.image.description=Local-first AI designer for HA Lovelace dashboards
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: addons/ha-ai-designer/Dockerfile
          platforms: ${{ matrix.arch.platform }}
          load: ${{ !(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push)) }}
          push: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.push) }}
          build-args: |
            BUILD_FROM=${{ matrix.arch.base_image }}
            BUILD_ARCH=${{ matrix.arch.arch }}
            BUILD_DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            BUILD_NAME=HA AI Designer
            BUILD_DESCRIPTION=Local-first AI designer for HA Lovelace dashboards
            BUILD_REF=${{ github.sha }}
            BUILD_REPOSITORY=${{ github.repository }}
            BUILD_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.arch.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch.arch }}

      # NOTE: GitHub does not allow changing package visibility via REST API.
      # The maintainer must set it to Public manually:
      #   https://github.com/users/lxgxdx/packages/container/ha-ai-designer/settings
      # (Danger Zone → Change package visibility → Public)
      # HA needs anonymous pull for the install to succeed.
