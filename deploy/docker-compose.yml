services:
  daemon:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.daemon
    image: ha-ai-designer/daemon:0.1.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:7456:7456"
    volumes:
      - ./data:/app/data
    environment:
      HA_DAEMON_HOST: 0.0.0.0
      HA_DAEMON_PORT: 7456
      HA_WEB_ORIGIN: http://localhost:3000
      HA_DATA_DIR: /app/data
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:7456/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    image: ha-ai-designer/web:0.1.0
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      daemon:
        condition: service_healthy
    environment:
      HA_DAEMON_URL: http://daemon:7456
      HA_WEB_PORT: 3000
      NODE_ENV: production
