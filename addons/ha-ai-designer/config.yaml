---
name: "HA AI Designer"
version: "0.4.0"
slug: "ha_ai_designer"
description: >
  Local-first AI designer for Home Assistant Lovelace dashboards.
  Describe your dashboard in natural language; the tool reads your live
  HA entities, generates a LovelaceConfig YAML, and pushes it to your
  dashboard — all running locally as a HA Add-on.
url: "https://github.com/lxgxdx/ha-ai-designer"
arch:
  - amd64
  - aarch64
init: false
startup: services
boot: auto
hassio_api: true
hassio_role: default
homeassistant_api: true
host_network: false
auth: false
ingress: true
ingress_port: 3000
panel_icon: "mdi:robot"
panel_title: "AI Designer"
panel_admin: true
# v0.3.1: no map entries. hha-knowledge is now baked into the image
# at build time (Dockerfile `git clone`s it into /opt/hha-knowledge,
# see CLAUDE.md 14 课 #14 for the build-context rationale and the
# GitHub URL configuration). run.sh then bind-mounts a persistence
# copy at /data/hha-knowledge via symlink, so the daemon's .feedback/
# writes survive container restarts without needing the user to
# provision any host path. Net effect: zero hha-knowledge setup
# required at install time.
ports:
  "7456/tcp": null
  "3000/tcp": null
ports_description:
  "7456/tcp": "daemon REST API (internal; prefer ingress)"
  "3000/tcp": "web UI (internal; prefer ingress)"
discovery:
  - ha_ai_designer
services:
  - "mqtt:need"
# v0.4.0: schema reduced from 9 fields to 2. LLM (chat + embedding)
# settings are no longer a per-add-on Configuration concern — they're
# set inside the add-on via the /setup wizard and persisted to
# /data/config.json. Rationale:
#   - One source of truth (config.json), not two (HA options + config.json)
#   - Provider-specific presets with sane defaults are easier to expose
#     in a UI than a flat list of baseUrl / model / apiKey text fields
#   - Users can rotate keys without restarting the add-on (wizard POSTs
#     to /api/llm/config which clears the cached config and writes
#     config.json directly)
# Only log_level (debug surface) and allowed_origins_extra (CSRF
# allowlist for direct-port access from a LAN IP or external hostname)
# stay as add-on options — both are infra/operational, not credentials.
schema:
  log_level: "list(trace|debug|info|notice|warning|error|fatal)"
  # v0.3.5: extra allowed origins for the web UI's CSRF guard
  # (api/setup/* + api/daemon proxy). Comma-separated list. Use this
  # when you've exposed the add-on's web port (config.yaml ports:
  # {3000: 3000}) and reach the UI from a hostname or LAN IP that
  # isn't HA's ingress. Example: "http://192.168.88.183:3000,http://ha-designer.lan:3000".
  # Ingress and localhost:3000 / 127.0.0.1:3000 are always allowed.
  allowed_origins_extra: "str?"
image: "ghcr.io/lxgxdx/ha-ai-designer"
